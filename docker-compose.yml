version: '3.8'

services:
  libriciel-api:
    build: .
    container_name: libriciel-partner-api-demo
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=VotreCleSecretePourLibricielDemoChangezLaEnProduction
      - JWT_EXPIRATION=86400000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - libriciel-network

networks:
  libriciel-network:
    driver: bridge
