spring.application.name=libriciel-partner-api-demo
server.port=8080

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# JWT Configuration
jwt.secret=CleSecretePourLibricielDemoILFautLaChangerEnProduction
jwt.expiration=86400000

# Logging
logging.level.fr.libriciel.demo=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
